<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Registration Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
        }
        .form-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 450px;
        }
        h2 {
            margin-top: 0;
            color: #111827;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #374151;
        }
        label .required {
            color: #ef4444;
        }
        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="tel"],
        input[type="number"],
        input[type="date"],
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .checkbox-group label {
            margin-bottom: 0;
            font-weight: normal;
        }
        button {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            font-size: 1rem;
        }
        button:hover {
            background-color: #2563eb;
        }
        .success-msg {
            display: none;
            background-color: #ecfdf5;
            color: #065f46;
            padding: 15px;
            border-radius: 4px;
            margin-top: 20px;
            border: 1px solid #a7f3d0;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Register Your Account</h2>
        <form id="regForm" onsubmit="event.preventDefault(); document.getElementById('success').style.display = 'block';">
            
            <div class="form-group">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" placeholder="Enter first name">
            </div>

            <div class="form-group">
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" placeholder="Enter last name">
            </div>

            <div class="form-group">
                <label for="email">Email Address <span class="required">*</span></label>
                <input type="email" id="email" required placeholder="name@domain.com">
            </div>

            <div class="form-group">
                <label for="phone">Phone Number <span class="required">*</span></label>
                <input type="tel" id="phone" required placeholder="Enter mobile number">
            </div>

            <div class="form-group">
                <label for="password">Password <span class="required">*</span></label>
                <input type="password" id="password" required placeholder="Choose a password">
            </div>

            <div class="form-group">
                <label for="membership">Membership Plan</label>
                <select id="membership">
                    <option value="basic">Basic (Free)</option>
                    <option value="premium">Premium ($19/mo)</option>
                    <option value="pro">Pro ($49/mo)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="birthDate">Date of Birth</label>
                <input type="date" id="birthDate">
            </div>

            <div class="form-group checkbox-group">
                <input type="checkbox" id="agreeTerms" required>
                <label for="agreeTerms">I agree to the Terms of Service <span class="required">*</span></label>
            </div>

            <button type="submit" id="submitBtn">Create Account</button>
        </form>

        <div id="success" class="success-msg">
            Registration Completed Successfully!
        </div>
    </div>
</body>
</html>
